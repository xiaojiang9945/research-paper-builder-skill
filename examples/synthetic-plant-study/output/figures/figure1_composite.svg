<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <style>
    text { font-family: Arial, sans-serif; fill: #17212b; }
    .title { font-size: 28px; font-weight: 700; }
    .panel { font-size: 24px; font-weight: 700; }
    .label { font-size: 18px; font-weight: 600; }
    .small { font-size: 15px; }
    .axis { stroke: #333; stroke-width: 1.4; }
    .grid { stroke: #d8dee4; stroke-width: 1; }
  </style>
  <rect width="1500" height="980" fill="#fff"/>
  <text x="750" y="42" text-anchor="middle" class="title">Figure 1. Synthetic seed germination package: design, endpoints, trajectory and claim boundary</text>

  <text x="40" y="90" class="panel">a</text>
  <rect x="70" y="78" width="405" height="245" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="272" y="112" text-anchor="middle" class="label">Synthetic assay design</text>
  <rect x="105" y="150" width="95" height="42" fill="#4c78a8"/><text x="152" y="177" text-anchor="middle" fill="#fff" class="small">3 mock genotypes</text>
  <text x="220" y="177" class="small">x</text>
  <rect x="245" y="150" width="95" height="42" fill="#2a9d8f"/><text x="292" y="177" text-anchor="middle" fill="#fff" class="small">2 treatments</text>
  <text x="360" y="177" class="small">x</text>
  <rect x="385" y="150" width="55" height="42" fill="#b279a2"/><text x="412" y="177" text-anchor="middle" fill="#fff" class="small">n=3</text>
  <text x="272" y="235" text-anchor="middle" class="small">25 seeds per replicate; Day 1-7 counts</text>
  <text x="272" y="270" text-anchor="middle" class="small">Primary endpoint: Day 7 germination percentage</text>

  <text x="520" y="90" class="panel">b</text>
  <rect x="550" y="78" width="420" height="245" fill="#fff" stroke="#cbd5e1"/>
  <text x="760" y="112" text-anchor="middle" class="label">Day 7 endpoint</text>
  <line x1="610" y1="275" x2="925" y2="275" class="axis"/><line x1="610" y1="135" x2="610" y2="275" class="axis"/>
  <line x1="610" y1="205" x2="925" y2="205" class="grid"/><line x1="610" y1="135" x2="925" y2="135" class="grid"/>
  <rect x="650" y="139" width="22" height="136" fill="#4c78a8"/><rect x="676" y="269" width="22" height="6" fill="#d55e00"/>
  <rect x="750" y="137" width="22" height="138" fill="#4c78a8"/><rect x="776" y="230" width="22" height="45" fill="#d55e00"/>
  <rect x="850" y="142" width="22" height="133" fill="#4c78a8"/><rect x="876" y="251" width="22" height="24" fill="#d55e00"/>
  <text x="674" y="300" text-anchor="middle" class="small">WT</text><text x="776" y="300" text-anchor="middle" class="small">Line A</text><text x="876" y="300" text-anchor="middle" class="small">Line B</text>
  <rect x="825" y="118" width="12" height="12" fill="#4c78a8"/><text x="842" y="130" class="small">Water</text>
  <rect x="825" y="140" width="12" height="12" fill="#d55e00"/><text x="842" y="152" class="small">Salt</text>

  <text x="1015" y="90" class="panel">c</text>
  <rect x="1045" y="78" width="405" height="245" fill="#fff" stroke="#cbd5e1"/>
  <text x="1248" y="112" text-anchor="middle" class="label">Salt time course</text>
  <line x1="1100" y1="275" x2="1410" y2="275" class="axis"/><line x1="1100" y1="135" x2="1100" y2="275" class="axis"/>
  <polyline points="1100,275 1152,275 1203,273 1255,269 1307,269 1358,269 1410,269" fill="none" stroke="#4c78a8" stroke-width="3"/>
  <polyline points="1100,275 1152,262 1203,241 1255,230 1307,230 1358,230 1410,230" fill="none" stroke="#54a24b" stroke-width="3"/>
  <polyline points="1100,275 1152,269 1203,256 1255,251 1307,251 1358,251 1410,251" fill="none" stroke="#b279a2" stroke-width="3"/>
  <text x="1110" y="300" class="small">1</text><text x="1402" y="300" class="small">7</text>
  <text x="1248" y="318" text-anchor="middle" class="small">Day after sowing</text>

  <text x="40" y="390" class="panel">d</text>
  <rect x="70" y="378" width="405" height="250" fill="#fff" stroke="#cbd5e1"/>
  <text x="272" y="414" text-anchor="middle" class="label">Salt-retention ranking</text>
  <line x1="125" y1="575" x2="430" y2="575" class="axis"/><line x1="125" y1="450" x2="125" y2="575" class="axis"/>
  <rect x="165" y="570" width="42" height="5" fill="#4c78a8"/><rect x="265" y="535" width="42" height="40" fill="#54a24b"/><rect x="365" y="552" width="42" height="23" fill="#b279a2"/>
  <text x="186" y="600" text-anchor="middle" class="small">WT</text><text x="286" y="600" text-anchor="middle" class="small">A</text><text x="386" y="600" text-anchor="middle" class="small">B</text>
  <text x="272" y="445" text-anchor="middle" class="small">Line A highest in synthetic data</text>

  <text x="520" y="390" class="panel">e</text>
  <rect x="550" y="378" width="420" height="250" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="760" y="414" text-anchor="middle" class="label">Evidence-to-claim boundary</text>
  <text x="585" y="460" class="small">Measured: daily counts</text>
  <text x="585" y="495" class="small">Derived: mean, SD, retention</text>
  <text x="585" y="530" class="small">Supported: descriptive ranking</text>
  <text x="585" y="565" class="small">Not supported: mechanism or field performance</text>
  <rect x="580" y="590" width="350" height="18" fill="#d55e00" opacity="0.25"/>

  <text x="1015" y="390" class="panel">f</text>
  <rect x="1045" y="378" width="405" height="250" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="1248" y="414" text-anchor="middle" class="label">Manuscript package outputs</text>
  <text x="1085" y="460" class="small">Evidence map</text>
  <text x="1085" y="490" class="small">Terminology ledger</text>
  <text x="1085" y="520" class="small">Figure plan + source data</text>
  <text x="1085" y="550" class="small">Citation-reference audit</text>
  <text x="1085" y="580" class="small">Reviewer-risk audit</text>

  <text x="750" y="920" text-anchor="middle" class="small">All values and citations in this demo are synthetic and are included only to show output structure.</text>
</svg>
